; clawdputer — M5Stack Cardputer firmware
; Board: M5Stack StampS3 (ESP32-S3) inside the Cardputer

; Host-side unit tests for hardware-agnostic logic. No ESP32 deps —
; compiles core/* and any module that only uses STL on a Mac/Linux host.
; Run:  pio test -e native
[env:native]
platform         = native
test_framework   = unity
; test_main.cpp pulls in the implementation .cpp files directly because
; PIO's test build doesn't filter from src/ in a useful way for native
; targets — this keeps the test setup minimal.
build_src_filter = -<*>
build_flags =
    -I src
    -std=gnu++17

[env:cardputer]
platform = espressif32
board = m5stack-stamps3
framework = arduino

monitor_speed = 115200
monitor_port = /dev/cu.usbmodem1101
upload_port = /dev/cu.usbmodem1101
upload_speed = 1500000

; Dual-OTA partition layout: bootloader can boot from either of two ~3MB app
; slots and atomically switch on a successful flash. Required by both the
; espota push path and the self-update HTTPS pull path.
board_build.partitions = default_8MB.csv

; Enable the StampS3's 8 MB octal PSRAM. mbedTLS allocates from here (see
; main.cpp's mbedtls_platform_set_calloc_free hook), which is what makes
; direct HTTPS to github.com fit — internal SRAM fragments below the
; ~36 KB contiguous block the handshake needs once WiFi is up.
board_build.arduino.memory_type = qio_opi

extra_scripts =
    pre:scripts/embed_version.py
    pre:scripts/embed_secrets.py

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DBOARD_HAS_PSRAM
    -DCLAWD_PROFILE_CANVAS
    -I src
    -std=gnu++17

build_unflags =
    -std=gnu++11

lib_deps =
    m5stack/M5Cardputer@^1.0.3
    h2zero/NimBLE-Arduino@^2.0.0
    bblanchon/ArduinoJson@^7.0.0
    ewpa/LibSSH-ESP32@^4.0.0

; Flash over WiFi using ArduinoOTA. Requires firmware/src/wifi_secrets.h
; with CLAWD_WIFI_SSID/PASS defined and the device already on the network.
; Set CLAWD_OTA_PASSWORD in the same header to require auth on uploads
; (and append --auth=<password> to upload_flags below).
;
;   pio run -e cardputer-ota -t upload
[env:cardputer-ota]
extends = env:cardputer
upload_protocol = espota
upload_port = clawdputer.local
upload_flags =
    --port=3232
