name: wokwi-publish

# Builds firmware.bin and force-pushes it (together with wokwi.toml,
# diagram.json and the cardputer-keyboard custom chip) to the orphan
# `wokwi-firmware` branch. The "Open in Wokwi" badge on the web demo
# points at https://wokwi.com/github/CHaerem/clawdputer/tree/wokwi-firmware
# so every visit loads the latest firmware via that branch.
#
# We use an orphan branch (force-pushed each time) to avoid bloating
# main with a ~1MB binary diff per release.

on:
  push:
    branches: [main]
    paths:
      - "firmware/**"
      - ".github/workflows/wokwi-publish.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wokwi-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            firmware/.pio
          key: pio-${{ runner.os }}-${{ hashFiles('firmware/platformio.ini') }}
          restore-keys: |
            pio-${{ runner.os }}-

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Build firmware
        working-directory: firmware
        run: pio run -e cardputer

      - name: Merge flash image for Wokwi
        working-directory: firmware/.pio/build/cardputer
        run: |
          python -m esptool --chip esp32s3 merge_bin \
            -o wokwi.bin \
            --flash_mode dio --flash_size 8MB --flash_freq 80m \
            0x0     bootloader.bin \
            0x8000  partitions.bin \
            0xe000  ota_data_initial.bin \
            0x10000 firmware.bin

      - name: Compile cardputer-keyboard custom chip
        working-directory: firmware/wokwi-chips/cardputer-keyboard
        run: |
          docker run --rm -u "$(id -u):$(id -g)" -v "$PWD":/work -w /work wokwi/builder-clang-wasm \
            clang --target=wasm32-unknown-wasi --sysroot /opt/wasi-libc \
              -nostartfiles -Wl,--export-table -Wl,--no-entry -Werror \
              -o chip.wasm chip.c
          test -s chip.wasm

      - name: Stage Wokwi bundle
        run: |
          set -euo pipefail
          rm -rf /tmp/wokwi-bundle
          mkdir -p /tmp/wokwi-bundle/firmware/wokwi-chips/cardputer-keyboard
          cp firmware/.pio/build/cardputer/wokwi.bin     /tmp/wokwi-bundle/firmware/wokwi.bin
          cp firmware/.pio/build/cardputer/firmware.elf  /tmp/wokwi-bundle/firmware/firmware.elf
          cp firmware/diagram.json                       /tmp/wokwi-bundle/firmware/diagram.json
          cp firmware/wokwi-chips/cardputer-keyboard/chip.wasm /tmp/wokwi-bundle/firmware/wokwi-chips/cardputer-keyboard/chip.wasm
          cp firmware/wokwi-chips/cardputer-keyboard/chip.json /tmp/wokwi-bundle/firmware/wokwi-chips/cardputer-keyboard/chip.json
          # Inline wokwi.toml that points at the committed binary, not
          # the .pio path (which doesn't exist in this branch).
          cat > /tmp/wokwi-bundle/firmware/wokwi.toml <<'TOML'
          [wokwi]
          version = 1
          firmware = 'wokwi.bin'
          elf      = 'firmware.elf'

          [[chip]]
          name   = "cardputer-keyboard"
          binary = "wokwi-chips/cardputer-keyboard/chip.wasm"
          TOML
          # Minimal README so the orphan branch is self-explanatory.
          cat > /tmp/wokwi-bundle/README.md <<'MD'
          # wokwi-firmware

          Auto-generated orphan branch. Force-pushed by
          `.github/workflows/wokwi-publish.yml` on every main build.
          Contains `firmware/firmware.bin` + Wokwi config so the
          `wokwi.com/github/CHaerem/clawdputer/tree/wokwi-firmware`
          embed loads the latest firmware without polluting main with
          binary diffs. Do not edit this branch by hand.
          MD

      - name: Force-push wokwi-firmware orphan branch
        run: |
          set -euo pipefail
          cd /tmp/wokwi-bundle
          git init -q
          git checkout --orphan wokwi-firmware
          git config user.name  "clawdputer-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          git commit -q -m "wokwi-firmware: $(date -u +%Y-%m-%dT%H:%M:%SZ) from ${GITHUB_SHA::7}"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" wokwi-firmware
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
