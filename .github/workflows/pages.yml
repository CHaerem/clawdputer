name: pages

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "firmware/src/apps/**"
      - "tools/gen-web-manifest.py"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate firmware app manifest
        run: python3 tools/gen-web-manifest.py

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web
          publish_branch: gh-pages
          # Keep pr-preview/ subdirectories created by pr-preview.yml so
          # they survive main deploys.
          keep_files: true
          commit_message: "deploy: ${{ github.event.head_commit.message }}"
