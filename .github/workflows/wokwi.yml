name: wokwi-smoke

# Boots firmware.bin in Wokwi via the same diagram.json + custom keyboard
# chip that ship to the public "Open in Wokwi" badge. Acts as a regression
# net for the simulator — if a firmware change breaks boot in the embed,
# this catches it before users click through. Still `continue-on-error`
# because the Wokwi-vs-real-hardware delta hasn't been audited end-to-end
# yet; flip that off once the run is reliably green.

on:
  push:
    branches: [main]
    paths:
      - "firmware/**"
      - ".github/workflows/wokwi.yml"
  pull_request:
    paths:
      - "firmware/**"
      - ".github/workflows/wokwi.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  boot-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            firmware/.pio
          key: pio-${{ runner.os }}-${{ hashFiles('firmware/platformio.ini') }}
          restore-keys: |
            pio-${{ runner.os }}-

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Build firmware
        working-directory: firmware
        run: pio run -e cardputer

      - name: Compile cardputer-keyboard custom chip
        working-directory: firmware/wokwi-chips/cardputer-keyboard
        run: |
          docker run --rm -u "$(id -u):$(id -g)" -v "$PWD":/work -w /work wokwi/builder-clang-wasm \
            clang --target=wasm32-unknown-wasi --sysroot /opt/wasi-libc \
              -nostartfiles -Wl,--export-table -Wl,--no-entry -Werror \
              -o chip.wasm chip.c
          test -s chip.wasm

      - name: Run Wokwi boot smoke test
        # Advisory only — Wokwi's StampS3 + custom keyboard chip may
        # still diverge from real-hardware init in subtle ways (panel
        # autodetect, missing IMU on I2C, etc). Once a run completes
        # cleanly on main we can drop continue-on-error so regressions
        # actually fail CI.
        id: smoke
        continue-on-error: true
        uses: wokwi/wokwi-ci-action@v1
        with:
          token: ${{ secrets.WOKWI_CLI_TOKEN }}
          path: firmware
          timeout: 60000
          scenario: test.scenario.yaml
          serial_log_file: wokwi-serial.log
          fail_text: "Guru Meditation"

      - name: Upload serial log
        # Always upload — continue-on-error above masks smoke failures
        # from the job, so a plain `if: failure()` would never fire.
        if: always() && hashFiles('firmware/wokwi-serial.log') != ''
        uses: actions/upload-artifact@v4
        with:
          name: wokwi-serial-log
          path: firmware/wokwi-serial.log
