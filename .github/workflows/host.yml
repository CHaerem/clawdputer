name: host

on:
  push:
    branches: [main]
    paths:
      - "host/**"
      - ".github/workflows/host.yml"
  workflow_dispatch:

concurrency:
  group: host-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build (release, warnings as errors)
        working-directory: host
        run: swift build -c release --arch arm64 --arch x86_64 -Xswiftc -warnings-as-errors

      - name: Smoke-check binary
        # The binary needs CoreBluetooth permission to do anything useful,
        # which CI runners don't grant, so we just verify it starts and
        # exits cleanly when we close stdin immediately.
        run: |
          echo "" | timeout 3 host/.build/apple/Products/Release/clawd-bridge || rc=$?
          # rc 124 = timeout (process kept running normally), rc 0 = clean
          # exit on EOF, anything else is a startup-time failure.
          rc=${rc:-0}
          if [ "$rc" -ne 0 ] && [ "$rc" -ne 124 ]; then
              echo "::error::bridge exited with $rc at startup"
              exit 1
          fi
          echo "bridge starts cleanly (rc=$rc)"

      - name: Stage artifact
        id: stage
        run: |
          SHA=$(git rev-parse --short=7 HEAD)
          mkdir -p out
          cp host/.build/apple/Products/Release/clawd-bridge out/clawd-bridge
          shasum -a 256 out/clawd-bridge | awk '{print $1}' > out/clawd-bridge.sha256
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          file out/clawd-bridge
          ls -lh out

      - name: Publish "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest build (${{ steps.stage.outputs.sha }})"
          body: |
            Auto-built from commit ${{ github.sha }}.

            Bridge installer for any Mac:
            ```
            curl -fsSL https://github.com/CHaerem/clawdputer/raw/main/host/install/online.sh | bash
            ```
          files: |
            out/clawd-bridge
            out/clawd-bridge.sha256
          fail_on_unmatched_files: true
          make_latest: "true"
